[agent]
  interval = "5s"
  round_interval = true
  flush_interval = "5s"
  flush_jitter = "0s"
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  hostname = "tasker-host"

# ==================== OUTPUTS ====================

[[outputs.influxdb_v2]]
  urls = ["http://influxdb:8086"]
  token = "tasker-admin-token"
  organization = "tasker"
  bucket = "metrics"

# ==================== INPUTS ====================

# --- Docker containers ---
[[inputs.docker]]
  endpoint = "unix:///var/run/docker.sock"
  gather_services = false
  container_names = []
  container_name_include = ["tasker_backend", "tasker_webapp", "tasker_tgbot", "tasker_prometheus", "tasker_grafana"]
  timeout = "5s"
  perdevice = false
  total = true
  docker_label_include = []

# --- HTTP Response (endpoint probing) ---
[[inputs.http_response]]
  urls = ["http://tasker_backend:8000/api/health"]
  response_timeout = "5s"
  method = "GET"
  response_string_match = "ok"
  [inputs.http_response.tags]
    endpoint = "health"
    service = "tasker-backend"

[[inputs.http_response]]
  urls = ["http://tasker_backend:8000/api/tasks?user_id=1&limit=1"]
  response_timeout = "5s"
  method = "GET"
  [inputs.http_response.tags]
    endpoint = "list_tasks"
    service = "tasker-backend"

# --- Scrape Prometheus metrics from backend ---
[[inputs.prometheus]]
  urls = ["http://tasker_backend:8000/metrics"]
  metric_version = 2
  [inputs.prometheus.tags]
    source = "tasker-backend"

# --- Host CPU ---
[[inputs.cpu]]
  percpu = false
  totalcpu = true
  collect_cpu_time = false
  report_active = true

# --- Host Memory ---
[[inputs.mem]]

# --- Host Disk ---
[[inputs.disk]]
  ignore_fs = ["tmpfs", "devtmpfs", "devfs", "iso9660", "overlay", "aufs", "squashfs"]

# --- Host Disk IO ---
[[inputs.diskio]]

# --- Host Network ---
[[inputs.net]]
  ignore_protocol_stats = true

# --- System uptime / load ---
[[inputs.system]]
