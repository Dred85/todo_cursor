services:
  backend:
    build:
      context: ./backend
    container_name: tasker_backend
    environment:
      - TASKER_DB_PATH=/data/tasker.sqlite3
    volumes:
      - tasker_data:/data
    ports:
      - "8000:8000"

  webapp:
    build:
      context: ./webapp
    container_name: tasker_webapp
    ports:
      - "5173:5173"
    depends_on:
      - backend

  tgbot:
    build:
      context: ./tgbot
    container_name: tasker_tgbot
    env_file:
      - ../.env
    environment:
      - TASKER_API_URL=http://tasker_backend:8000
    depends_on:
      - backend
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: tasker_prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - backend
    restart: unless-stopped

  influxdb:
    image: influxdb:2.7
    container_name: tasker_influxdb
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=adminadmin
      - DOCKER_INFLUXDB_INIT_ORG=tasker
      - DOCKER_INFLUXDB_INIT_BUCKET=metrics
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=tasker-admin-token
    volumes:
      - influxdb_data:/var/lib/influxdb2
    ports:
      - "8086:8086"
    restart: unless-stopped

  telegraf:
    image: telegraf:1.31
    container_name: tasker_telegraf
    volumes:
      - ./monitoring/telegraf.conf:/etc/telegraf/telegraf.conf:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - influxdb
      - backend
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.1.0
    container_name: tasker_grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-clock-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - influxdb
    restart: unless-stopped

volumes:
  tasker_data:
  prometheus_data:
  grafana_data:
  influxdb_data:

