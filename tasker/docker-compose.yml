services:
  backend:
    build:
      context: ./backend
    container_name: tasker_backend
    environment:
      - TASKER_DB_PATH=/data/tasker.sqlite3
    volumes:
      - tasker_data:/data
    ports:
      - "8000:8000"

  webapp:
    build:
      context: ./webapp
    container_name: tasker_webapp
    ports:
      - "5173:5173"
    depends_on:
      - backend

  tgbot:
    build:
      context: ./tgbot
    container_name: tasker_tgbot
    env_file:
      - ../.env
    environment:
      - TASKER_API_URL=http://tasker_backend:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  tasker_data:

